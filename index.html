<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Memantau kesan krisis bekalan global ke atas Malaysia — papan pemuka hampir masa nyata oleh GovTech Malaysia." />
    <meta name="theme-color" content="#f9f8f3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Tipografi selaras kd-portal / MyDS: Inter (badan) + Poppins (tajuk) -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Krisis Bekalan Global: Dashboard Malaysia</title>
    <script>
      (function () {
        var t = localStorage.getItem('pantau-krisis-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
